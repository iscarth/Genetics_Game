    </div>
  );
}

function MultiplayerGame() {
  const [playerCount, setPlayerCount] = useState(null);
  const [names, setNames] = useState(["","","",""]);
  const [players, setPlayers] = useState([]);
  const [setupDone, setSetupDone] = useState(false);
  const [currentPlayerIdx, setCurrentPlayerIdx] = useState(0);
  const [phase, setPhase] = useState("selectDifficulty");
  const [currentQ, setCurrentQ] = useState(null);
  const [donQuestion, setDonQuestion] = useState(null);
  const [spacesEarned, setSpacesEarned] = useState(0);
  const [usedIds] = useState(new Set());
  const [lastResult, setLastResult] = useState(null);
  const [showBoard, setShowBoard] = useState(true);

  const diffMap = { easy: 1, medium: 2, hard: 3 };

  const currentPlayer = players[currentPlayerIdx] || {};
  const zone = zoneOf(Math.max(1, currentPlayer.position || 1));

  const selectDifficulty = (diff) => {
    const zoneId = Math.ceil(Math.max(1, currentPlayer.position) / 6);
    const q = randomQuestion(zoneId, diff, usedIds);
    usedIds.add(q.id);
    setCurrentQ(q);
    setSpacesEarned(diffMap[diff]);
    setPhase("question");
  };

  const handleMainAnswer = (correct) => {
    if (correct) {
      setLastResult("correct");
      setPhase("doubleOrNothing");
    } else {
      setLastResult("wrong");
      setPhase("result");
    }
  };

  const acceptDon = () => {
    const nextDiff = { easy:"medium", medium:"hard", hard:"hard" }[currentQ.difficulty];
    const zoneId = Math.ceil(Math.max(1, currentPlayer.position) / 6);
    const q = randomQuestion(zoneId, nextDiff, usedIds);
    usedIds.add(q.id);
    setDonQuestion(q);
    setPhase("donq");
  };

  const declineDon = () => {
    movePlayer(spacesEarned);
    setPhase("result");
  };

  const handleDonAnswer = (correct) => {
    if (correct) {
      setSpacesEarned(s => s * 2);
      setLastResult("donCorrect");
    } else {
      setSpacesEarned(0);
      setLastResult("donWrong");
    }
    setPhase("result");
    if (correct) setTimeout(() => { movePlayer(spacesEarned * 2); }, 100);
    else movePlayer(0);
  };

  const movePlayer = useCallback((spaces) => {
    setPlayers(prev => prev.map((p, i) => {
      if (i !== currentPlayerIdx) return p;
      const newPos = Math.min(30, p.position + spaces);
      return { ...p, position: newPos };
    }));
  }, [currentPlayerIdx]);

  const nextTurn = () => {
    const newPos = players[currentPlayerIdx].position;
    if (newPos >= 30) { setPhase("gameOver"); return; }
    setCurrentPlayerIdx(i => (i + 1) % players.length);
    setPhase("selectDifficulty");
    setCurrentQ(null);
    setDonQuestion(null);
    setLastResult(null);
    setSpacesEarned(0);
    setShowBoard(true);
  };

  if (!playerCount) return (
    <div className="space-y-4">
      <div className="text-center">
        <h2 className="text-xl font-bold text-gray-800 mb-1">🧬 Board Game Mode</h2>
        <p className="text-sm text-gray-500">Race to space 30 across 5 topic zones</p>
      </div>
      <div className="space-y-2">
        <p className="text-sm font-medium text-gray-700 text-center">How many players?</p>
        {[2,3,4].map(n => (
          <button key={n} onClick={() => setPlayerCount(n)}
            className="w-full py-4 rounded-xl border-2 border-gray-200 bg-white hover:bg-blue-50 hover:border-blue-400 font-bold text-lg transition-all">
            {n} Players
          </button>
        ))}
      </div>
    </div>
  );

  if (!setupDone) {
    const [names, setNames] = useState(Array(playerCount).fill(""));
    const ready = names.every(n => n.trim().length > 0);
    return (
      <div className="space-y-4">
        <h2 className="text-lg font-bold text-center">Enter player names</h2>
        {Array(playerCount).fill(0).map((_, i) => (
          <div key={i} className="flex items-center gap-3">
            <div className={`w-8 h-8 rounded-full ${PCOLORS[i].bg} flex-shrink-0`}/>
            <input value={names[i]} onChange={e => { const n=[...names]; n[i]=e.target.value; setNames(n); }}
              placeholder={`Player ${i+1} name`}
              className="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
          </div>
        ))}
        <button onClick={() => {
          setPlayers(names.map((name, i) => ({ id: i, name: name.trim() || `Player ${i+1}`, position: 0, colorIdx: i })));
          setSetupDone(true);
        }} disabled={!ready}
          className={`w-full py-3 rounded-xl font-bold text-white transition-all ${ready ? "bg-blue-600 hover:bg-blue-700" : "bg-gray-300 cursor-not-allowed"}`}>
          Start Game →
        </button>
      </div>
    );
  }

  if (phase === "gameOver") {
    const winner = [...players].sort((a,b) => b.position - a.position)[0];
    return (
      <div className="text-center space-y-4">
        <div className="text-6xl">🏆</div>
        <h2 className="text-2xl font-bold">{winner.name} wins!</h2>
        <p className="text-gray-600">Reached space {winner.position} first</p>
        <div className="space-y-2">
          {players.sort((a,b)=>b.position-a.position).map((p,i) => (
            <div key={p.id} className={`flex items-center gap-3 p-3 rounded-xl ${i===0 ? "bg-yellow-50 border-2 border-yellow-400":""}`}>
              <div className={`w-8 h-8 rounded-full ${PCOLORS[p.colorIdx].bg}`}/>
              <span className="font-bold">{p.name}</span>
              <span className="ml-auto text-gray-600">Space {p.position}</span>
              {i===0&&<span>👑</span>}
            </div>
          ))}
        </div>
      </div>
    );
  }

  const pc = PCOLORS[currentPlayer.colorIdx] || PCOLORS[0];

  return (
    <div className="space-y-4">
      {/* Player indicator */}
      <div className={`flex items-center gap-3 p-3 rounded-xl ${pc.bg} bg-opacity-10 border-2`} style={{borderColor: pc.hex || "#888"}}>
        <div className={`w-10 h-10 rounded-full ${pc.bg} flex items-center justify-center text-white font-bold`}>
          {currentPlayer.name?.[0]?.toUpperCase()}
        </div>
        <div>
          <p className="font-bold text-sm">{currentPlayer.name}'s turn</p>
          <p className="text-xs text-gray-500">Space {currentPlayer.position} → {zone.name}</p>
        </div>
        <div className="ml-auto flex gap-1">
          {players.map(p => (
            <div key={p.id} title={`${p.name}: space ${p.position}`}
              className={`w-6 h-6 rounded-full border-2 border-white ${PCOLORS[p.colorIdx].bg} flex items-center justify-center text-white text-xs font-bold`}>
              {p.position}
            </div>
          ))}
        </div>
      </div>

      {/* Board toggle */}
      <button onClick={() => setShowBoard(b=>!b)} className="w-full py-2 text-xs text-blue-600 underline">
        {showBoard ? "▲ Hide board" : "▼ Show board"}
      </button>
      {showBoard && <Board players={players} />}

      {/* Turn phases */}
      {phase === "selectDifficulty" && (
        <div className="space-y-3">
          <p className="text-center font-bold text-gray-700">Choose your question difficulty:</p>
          {[
            { d:"easy",   label:"Easy",   spaces:1, desc:"Multiple choice or True/False",        emoji:"🟢" },
            { d:"medium", label:"Medium", spaces:2, desc:"Matching or Sequence ordering",          emoji:"🟡" },
            { d:"hard",   label:"Hard",   spaces:3, desc:"Punnett square, Error ID, or Scenario", emoji:"🔴" },
          ].map(opt => (
            <button key={opt.d} onClick={() => selectDifficulty(opt.d)}
              className={`w-full text-left p-4 rounded-xl border-2 transition-all hover:scale-105 active:scale-95
                ${opt.d==="easy" ? "border-green-300 bg-green-50 hover:border-green-500" 
                : opt.d==="medium" ? "border-yellow-300 bg-yellow-50 hover:border-yellow-500"
                : "border-red-300 bg-red-50 hover:border-red-500"}`}>
              <div className="flex items-center justify-between">
                <div>
                  <span className="text-lg mr-2">{opt.emoji}</span>
                  <span className="font-bold">{opt.label}</span>
                  <span className="ml-2 text-xs text-gray-500">{opt.desc}</span>
                </div>
                <span className="font-bold text-lg">+{opt.spaces} 🏃</span>
              </div>
            </button>
          ))}
          <p className={`text-xs text-center ${zone.text}`}>Topic zone: {zone.emoji} {zone.name}</p>
        </div>
      )}

      {phase === "question" && currentQ && (
        <div className={`p-4 rounded-2xl border-2 ${zone.bg} ${zone.border}`}>
          <QuestionDisplay question={currentQ} onAnswer={handleMainAnswer} />
        </div>
      )}

      {phase === "doubleOrNothing" && (
        <div className="text-center space-y-4 p-4 bg-gradient-to-br from-yellow-50 to-orange-50 rounded-2xl border-2 border-yellow-400">
          <div className="text-4xl">⚡</div>
          <h3 className="text-lg font-bold">Double or Nothing!</h3>
          <p className="text-sm text-gray-600">
            You earned <strong>{spacesEarned} space{spacesEarned>1?"s":""}</strong>.<br/>
            Answer a harder question to <strong>double to {spacesEarned*2}</strong> spaces<br/>
            or lose your movement this turn.
          </p>
          <div className="flex gap-3">
            <button onClick={declineDon} className="flex-1 py-3 bg-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-300 transition-all">
              Keep {spacesEarned} ✓
            </button>
            <button onClick={acceptDon} className="flex-1 py-3 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-xl font-bold hover:opacity-90 transition-all">
              Double it! ⚡
            </button>
          </div>
        </div>
      )}

      {phase === "donq" && donQuestion && (
        <div className="p-4 rounded-2xl border-2 border-orange-400 bg-orange-50">
          <div className="text-center mb-3">
            <span className="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-1 rounded-full">⚡ DOUBLE OR NOTHING</span>
          </div>
          <QuestionDisplay question={donQuestion} onAnswer={handleDonAnswer} />
        </div>
      )}

      {phase === "result" && (
        <div className={`p-4 rounded-2xl text-center space-y-3 ${
          lastResult==="donWrong" ? "bg-red-50 border-2 border-red-300" 
          : lastResult==="wrong" ? "bg-gray-50 border-2 border-gray-300" 
          : "bg-green-50 border-2 border-green-300"}`}>
          <div className="text-4xl">
            {lastResult==="donWrong" ? "💥" : lastResult==="wrong" ? "😬" : "🎉"}
          </div>
          <h3 className="font-bold text-lg">
            {lastResult==="donWrong" ? "Doubled down… and lost!" 
            : lastResult==="wrong" ? "No movement this turn"
            : lastResult==="donCorrect" ? `Doubled! Moving ${spacesEarned} spaces!`
            : `Moving ${spacesEarned} space${spacesEarned>1?"s":""}!`}
          </h3>
          <p className="text-sm text-gray-600">
            {currentPlayer.name} → Space {Math.min(30, currentPlayer.position + (lastResult==="donWrong"||lastResult==="wrong"?0:spacesEarned))}
          </p>
          <button onClick={nextTurn} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all">
            {players[(currentPlayerIdx+1)%players.length]?.name}'s Turn →
          </button>
        </div>
      )}
    </div>
  );
}

// ── Solo mode ─────────────────────────────────────────────────
function SoloMode() {
  const [selectedZone, setSelectedZone] = useState(null);
  const [selectedDiff, setSelectedDiff] = useState(null);
  const [currentQ, setCurrentQ] = useState(null);
  const [score, setScore] = useState({ correct: 0, total: 0 });
  const [usedIds] = useState(new Set());
  const [phase, setPhase] = useState("setup"); // setup | question | feedback

  const startSession = () => {
    const zone = selectedZone === 0 ? Math.ceil(Math.random() * 5) : selectedZone;
    const diffs = selectedDiff === "all" ? ["easy","medium","hard"] : [selectedDiff];
    const diff = diffs[Math.floor(Math.random() * diffs.length)];
    const zoneActual = selectedZone === 0 ? zone : selectedZone;
    const q = randomQuestion(zoneActual, diff, usedIds);
    usedIds.add(q.id);
    setCurrentQ(q);
    setPhase("question");
  };

  const nextQ = () => {
    const zone = selectedZone === 0 ? Math.ceil(Math.random() * 5) : selectedZone;
    const diffs = selectedDiff === "all" ? ["easy","medium","hard"] : [selectedDiff];
    const diff = diffs[Math.floor(Math.random() * diffs.length)];
    const q = randomQuestion(zone, diff, usedIds);
    usedIds.add(q.id);
    setCurrentQ(q);
    setPhase("question");
  };

  const handleAnswer = (correct) => {
    setScore(s => ({ correct: s.correct + (correct ? 1 : 0), total: s.total + 1 }));
  };

  if (phase === "setup") return (
    <div className="space-y-5">
      <div className="text-center">
        <h2 className="text-xl font-bold text-gray-800">📚 Solo Study Mode</h2>
        <p className="text-sm text-gray-500 mt-1">No pressure — learn at your own pace</p>
      </div>
      <div>
        <p className="text-sm font-semibold text-gray-700 mb-2">Choose a topic zone:</p>
        <div className="space-y-2">
          <button onClick={() => setSelectedZone(0)}
            className={`w-full p-3 rounded-xl border-2 text-sm font-medium transition-all ${selectedZone===0?"border-blue-500 bg-blue-50":"border-gray-200 bg-white hover:border-gray-300"}`}>
            🌐 All Zones (random)
          </button>
          {ZONES.map(z => (
            <button key={z.id} onClick={() => setSelectedZone(z.id)}
              className={`w-full p-3 rounded-xl border-2 text-sm font-medium transition-all text-left ${selectedZone===z.id?`${z.border} ${z.bg}`:"border-gray-200 bg-white hover:border-gray-300"}`}>
              {z.emoji} Zone {z.id}: {z.name}
            </button>
          ))}
        </div>
      </div>
      <div>
        <p className="text-sm font-semibold text-gray-700 mb-2">Choose difficulty:</p>
        <div className="grid grid-cols-2 gap-2">
          {[{v:"all",l:"All difficulties"},{v:"easy",l:"🟢 Easy"},{v:"medium",l:"🟡 Medium"},{v:"hard",l:"🔴 Hard"}].map(opt => (
            <button key={opt.v} onClick={() => setSelectedDiff(opt.v)}
              className={`p-3 rounded-xl border-2 text-sm font-medium transition-all ${selectedDiff===opt.v?"border-blue-500 bg-blue-50":"border-gray-200 bg-white hover:border-gray-300"}`}>
              {opt.l}
            </button>
          ))}
        </div>
      </div>
      <button onClick={startSession} disabled={selectedZone===null||!selectedDiff}
        className={`w-full py-4 rounded-xl font-bold text-white text-lg transition-all ${selectedZone!==null&&selectedDiff?"bg-blue-600 hover:bg-blue-700":"bg-gray-300 cursor-not-allowed"}`}>
        Start Studying →
      </button>
    </div>
  );

  const pct = score.total > 0 ? Math.round(100 * score.correct / score.total) : 0;

  return (
    <div className="space-y-4">
      {/* Score bar */}
      <div className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl border">
        <div className="flex-1">
          <div className="flex justify-between text-xs text-gray-500 mb-1">
            <span>Score: {score.correct}/{score.total}</span>
            <span>{score.total > 0 ? pct+"%" : "--"}</span>
          </div>
          <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
            <div className={`h-full rounded-full transition-all ${pct>=80?"bg-green-500":pct>=60?"bg-yellow-500":"bg-blue-500"}`}
              style={{width: score.total ? pct+"%" : "0%"}}/>
          </div>
        </div>
        <button onClick={() => { setPhase("setup"); setScore({correct:0,total:0}); }}
          className="text-xs text-gray-400 hover:text-gray-600 underline">Change zone</button>
      </div>

      {currentQ && (
        <div className={`p-4 rounded-2xl border-2 ${getZone(currentQ.zone).bg} ${getZone(currentQ.zone).border}`}>
          <QuestionDisplay question={currentQ} onAnswer={handleAnswer} key={currentQ.id} />
        </div>
      )}

      <button onClick={nextQ} className="w-full py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-gray-700 transition-all">
        Next Question →
      </button>
    </div>
  );
}

// ── Home screen ──────────────────────────────────────────────
function HomeScreen({ onMode }) {
  return (
    <div className="space-y-6">
      <div className="text-center pt-4">
        <div className="text-5xl mb-3">🧬</div>
        <h1 className="text-2xl font-black text-gray-900 tracking-tight">Bio376 Genetics</h1>
        <h2 className="text-xl font-black text-blue-600 tracking-tight">Review Game</h2>
        <p className="text-sm text-gray-500 mt-2">UH Hilo • Spring 2026</p>
      </div>

      <div className="grid grid-cols-5 gap-1">
        {ZONES.map(z => (
          <div key={z.id} className={`p-2 rounded-xl ${z.bg} border ${z.border} text-center`}>
            <div className="text-xl">{z.emoji}</div>
            <div className={`text-xs font-bold ${z.text} leading-tight mt-1`}>{z.short}</div>
          </div>
        ))}
      </div>

      <div className="space-y-3">
        <button onClick={() => onMode("solo")}
          className="w-full p-5 rounded-2xl bg-gradient-to-r from-blue-600 to-blue-700 text-white text-left hover:from-blue-700 hover:to-blue-800 transition-all active:scale-98 shadow-lg">
          <div className="text-2xl mb-1">📚</div>
          <div className="font-black text-lg">Solo Study Mode</div>
          <div className="text-blue-200 text-sm">Practice any topic zone at your own pace with immediate feedback</div>
        </button>
        <button onClick={() => onMode("multi")}
          className="w-full p-5 rounded-2xl bg-gradient-to-r from-purple-600 to-pink-600 text-white text-left hover:from-purple-700 hover:to-pink-700 transition-all active:scale-98 shadow-lg">
          <div className="text-2xl mb-1">🎲</div>
          <div className="font-black text-lg">Board Game Mode</div>
          <div className="text-purple-200 text-sm">2–4 players race across 30 spaces • Double-or-Nothing gambles • First to space 30 wins!</div>
        </button>
      </div>

      <div className="text-center text-xs text-gray-400 space-y-1 pb-4">
        <p>120 questions across 5 exam zones</p>
        <p>Content from Bio376 lecture slides</p>
        <p>Multiple choice · T/F · Matching · Punnett squares · more</p>
      </div>
    </div>
  );
}

// ── App root ─────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-100 to-blue-50 flex items-start justify-center p-4">
      <div className="w-full max-w-sm bg-white rounded-3xl shadow-2xl overflow-hidden">
        {/* Header */}
        <div className="bg-gradient-to-r from-blue-700 to-purple-700 px-4 py-3 flex items-center gap-2">
          {screen !== "home" && (
            <button onClick={() => setScreen("home")} className="text-white opacity-70 hover:opacity-100 transition-opacity mr-1 text-lg">←</button>
          )}
          <span className="text-white font-black text-sm tracking-wide flex-1 text-center">
            {screen === "home" ? "BIO 376 GENETICS REVIEW" : screen === "solo" ? "SOLO STUDY" : "BOARD GAME"}
          </span>
          <span className="text-white opacity-50 text-xs">UH Hilo</span>
        </div>

        {/* Content */}
        <div className="p-4 overflow-y-auto" style={{ maxHeight: "calc(100vh - 100px)" }}>
          {screen === "home" && <HomeScreen onMode={setScreen} />}
          {screen === "solo" && <SoloMode />}
          {screen === "multi" && <MultiplayerGame key="multi" />}
        </div>
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
