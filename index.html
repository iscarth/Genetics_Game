    pairs:[
      { term:"Cis (coupling) configuration",  match:"Two dominant alleles are on the same chromosome: AB / ab" },
      { term:"Trans (repulsion) configuration",match:"Dominant alleles are on opposite chromosomes: Ab / aB" },
      { term:"Linkage",                        match:"Non-allelic genes on the same chromosome tend to stay together in meiosis" },
      { term:"Interference",                   match:"The effect of one crossover on the probability of a second crossover nearby" },
    ],
    explanation:"Cis and trans configurations in a heterozygote affect which gametes are the parental types vs. recombinant types, but do not affect the recombination frequency between the loci." },

  { id:"z2_m8", zone:2, difficulty:"medium", type:"ordering",
    prompt:"Arrange the steps in the logic of identifying a LINKED gene pair from testcross results, in order:",
    items:["Perform a chi-square test to assess significance of deviation","Compare observed classes to expected 1:1:1:1 ratio","Carry out AaBb × aabb testcross","Conclude linkage if deviation is statistically significant","Record offspring phenotype frequencies"],
    correct_order:["Carry out AaBb × aabb testcross","Record offspring phenotype frequencies","Compare observed classes to expected 1:1:1:1 ratio","Perform a chi-square test to assess significance of deviation","Conclude linkage if deviation is statistically significant"],
    explanation:"If genes are linked, the parental-type classes are more frequent than recombinant classes, causing a significant deviation from the 1:1:1:1 ratio expected under independent assortment." },

  // — Hard —
  { id:"z2_h1", zone:2, difficulty:"hard", type:"error_id",
    prompt:"A student writes: \"A translocation is when a chromosomal segment breaks off, flips around 180°, and reattaches in reverse orientation on the same chromosome.\"\n\nWhat is wrong with this statement?",
    options:[
      "The statement is correct — translocation and inversion are the same thing",
      "The student described an INVERSION, not a translocation. A translocation involves a segment moving to a DIFFERENT chromosome",
      "Chromosome segments cannot flip orientation",
      "Translocations only occur in cancer cells"
    ],
    correct:"B",
    explanation:"The student described an inversion. A translocation is when a chromosome segment breaks off and attaches to a non-homologous chromosome. An inversion is the rearrangement where the segment flips and reattaches on the same chromosome." },

  { id:"z2_h2", zone:2, difficulty:"hard", type:"error_id",
    prompt:"A genetics student states: \"Recombination frequency between two very distantly linked genes can exceed 50%, making them appear to assort independently or even show negative association.\"\n\nIdentify the error:",
    options:[
      "Recombination can exceed 50% for distantly linked genes",
      "The maximum recombination frequency is 50% — beyond 50 cM, genes appear to assort independently even if on the same chromosome",
      "Genes on the same chromosome always show linkage regardless of distance",
      "Negative association between linked genes is common and expected"
    ],
    correct:"B",
    explanation:"Recombination frequency has an upper limit of 50% (equivalent to independent assortment). When genes are very far apart on the same chromosome, multiple crossovers cause them to appear unlinked, but the frequency cannot mathematically exceed 50%." },

  { id:"z2_h3", zone:2, difficulty:"hard", type:"punnett",
    prompt:"Two genes are located 20 cM apart on the same chromosome in coupling (cis): AB/ab heterozygote crossed with ab/ab.\n\nFill in the gamete class frequencies (use the 2×2 table where row gametes are from the heterozygous parent).",
    cross:"AB/ab × ab/ab (20 cM apart)",
    row_gametes:["AB (parental)","ab (parental)","Ab (recomb.)","aB (recomb.)"],
    col_gametes:["ab"],
    correct_cells:["40%","40%","10%","10%"],
    cell_options:["10%","20%","40%","50%"],
    ratio_prompt:"What are the RECOMBINANT offspring classes and their expected frequency?",
    ratio_options:["Ab and aB, each 40%","AB and ab, each 10%","Ab and aB, each 10%","All classes equal at 25%"],
    ratio_correct:"C",
    explanation:"With 20 cM distance, 20% of gametes are recombinant: 10% Ab and 10% aB. The parental gametes (AB and ab) each make up 40% of gametes. Thus recombinant offspring = 20% total." },

  { id:"z2_h4", zone:2, difficulty:"hard", type:"error_id",
    prompt:"An instructor states: \"Broad-sense heritability and narrow-sense heritability give the same prediction for the response to artificial selection.\"\n\nWhat is the error?",
    options:[
      "Both heritabilities predict the same response to selection",
      "Only narrow-sense heritability (h²) predicts response to selection, because only additive genetic variance is reliably passed from parents to offspring",
      "Broad-sense heritability always overestimates the response to selection",
      "Heritability has no relationship to the response to selection"
    ],
    correct:"B",
    explanation:"Response to selection = h² × selection differential. Only narrow-sense (h²) is used because dominance and epistatic effects do not breed true — they are unpredictably reshuffled each generation. H² can only be used for clonally propagated organisms." },

  { id:"z2_h5", zone:2, difficulty:"hard", type:"error_id",
    prompt:"A student reading a karyotype report states: \"This individual has 45 chromosomes total (monosomy X = 45, X0). Since they are missing the second sex chromosome, they must be male.\"\n\nWhat is the error?",
    options:[
      "45,X0 individuals are chromosomally female (Turner syndrome), not male — sex is determined by the presence of the Y chromosome",
      "The statement is correct — 45,X0 is always male",
      "Monosomy X always results in lethality",
      "Sex is determined by chromosome number, not sex chromosome composition"
    ],
    correct:"A",
    explanation:"45,X (Turner syndrome) individuals have a single X chromosome and no Y chromosome. They develop as phenotypically female but with ovarian dysgenesis and other features. Male sex determination requires the SRY gene on the Y chromosome." },

  { id:"z2_h6", zone:2, difficulty:"hard", type:"error_id",
    prompt:"A student says: \"In a three-point cross, I can ignore the double recombinant class since it's so rare — removing it won't affect my gene-order determination.\"\n\nWhy is this wrong?",
    options:[
      "The student is correct — the double recombinants are too rare to matter",
      "The double recombinant class identifies which gene is in the MIDDLE; ignoring it makes it impossible to determine gene order",
      "Double recombinants only exist in theoretical calculations",
      "Gene order must be determined from parental classes only"
    ],
    correct:"B",
    explanation:"The double recombinant class is crucial for gene-order determination: compare it to the parental class — the one gene whose allele arrangement has flipped relative to the parental combination is the middle gene." },

  // ══════════════════════════════════════════════════════════
  // ZONE 3 — BACTERIAL GENETICS & GENOMES  (10 easy, 8 medium, 6 hard)
  // ══════════════════════════════════════════════════════════

  // — Easy —
  { id:"z3_e1", zone:3, difficulty:"easy", type:"multiple_choice",
    prompt:"Bacterial transformation is defined as:",
    options:["Transfer of DNA via a bacterial virus (phage)","Uptake of free DNA from the environment by a bacterial cell","Transfer of DNA through direct cell-to-cell contact via a pilus","Insertion of a plasmid into the bacterial chromosome"],
    correct:"B",
    explanation:"Transformation is the uptake and incorporation of free DNA from the environment. Cells capable of taking up DNA are called 'competent.' This mechanism was first demonstrated by Griffith and later explained by Avery, MacLeod, and McCarty." },

  { id:"z3_e2", zone:3, difficulty:"easy", type:"true_false",
    prompt:"In bacterial conjugation, the F⁺ cell is the DONOR that transfers DNA to the F⁻ recipient cell.",
    correct:"True",
    explanation:"The F plasmid (fertility factor) in F⁺ cells encodes proteins needed to form a sex pilus and transfer DNA. The F⁺ cell is always the donor; the F⁻ cell is the recipient." },

  { id:"z3_e3", zone:3, difficulty:"easy", type:"multiple_choice",
    prompt:"The abbreviation 'Hfr' in bacterial genetics stands for:",
    options:["High-frequency replication","Heterozygous fluorescent recombinant","High-frequency recombination","Homologous fragment recombination"],
    correct:"C",
    explanation:"Hfr (High Frequency Recombination) strains arise when the F plasmid integrates into the bacterial chromosome. Hfr × F⁻ matings produce recombinants at a frequency more than 1000 times higher than F⁺ × F⁻ matings." },

  { id:"z3_e4", zone:3, difficulty:"easy", type:"multiple_choice",
    prompt:"Which type of transduction can transfer ANY gene from the bacterial chromosome?",
    options:["Specialized transduction","Generalized transduction","Conjugative transduction","Transformational transduction"],
    correct:"A",
    explanation:"Generalized transduction occurs when a phage accidentally packages random fragments of bacterial DNA instead of phage DNA. It can transfer any bacterial gene. Specialized transduction only transfers genes adjacent to the phage integration site." },

  { id:"z3_e5", zone:3, difficulty:"easy", type:"true_false",
    prompt:"The Meselson-Stahl experiment (1958) provided direct evidence that DNA replication is semi-conservative.",
    correct:"True",
    explanation:"Meselson and Stahl grew bacteria in ¹⁵N medium, then shifted to ¹⁴N. After one generation, all DNA was intermediate density (hybrid); after two generations, hybrid and light DNA appeared — consistent only with semi-conservative replication." },

  { id:"z3_e6", zone:3, difficulty:"easy", type:"multiple_choice",
    prompt:"Okazaki fragments are short segments of newly synthesized DNA that:",
    options:["Form on the leading strand during continuous synthesis","Form on the lagging strand and are later joined by DNA ligase","Are produced during mismatch repair","Serve as primers for leading-strand synthesis"],
    correct:"B",
    explanation:"Because DNA polymerase can only synthesize in the 5'→3' direction, the lagging strand is made discontinuously as a series of short fragments (Okazaki fragments) that are later joined by DNA ligase." },

  { id:"z3_e7", zone:3, difficulty:"easy", type:"true_false",
    prompt:"Transposable elements are DNA sequences that can move (transpose) from one location in the genome to another.",
    correct:"True",
    explanation:"Transposable elements (transposons) are 'jumping genes' that can relocate within the genome. They include DNA transposons and retrotransposons and make up a large fraction of most eukaryotic genomes." },

  { id:"z3_e8", zone:3, difficulty:"easy", type:"multiple_choice",
    prompt:"The leading strand in DNA replication is synthesized:",
    options:["Discontinuously in the direction away from the replication fork","Continuously in the 5'→3' direction toward the replication fork","In the 3'→5' direction by a specialized polymerase","Only after the lagging strand is complete"],
    correct:"B",
    explanation:"The leading strand is synthesized continuously in the 5'→3' direction toward the replication fork, requiring only a single RNA primer at the origin. The lagging strand is synthesized discontinuously in the opposite direction." },

  { id:"z3_e9", zone:3, difficulty:"easy", type:"multiple_choice",
    prompt:"Satellite DNA is characterized by:",
    options:["Unique sequences that code for important proteins","Highly repetitive sequences that band at a different buoyant density from main-band DNA in CsCl gradients","Single-copy sequences found throughout the genome","DNA sequences that satellite around origins of replication"],
    correct:"B",
    explanation:"Satellite DNA consists of highly repetitive short sequences. Its atypical base composition causes it to form a 'satellite' band separate from bulk genomic DNA when centrifuged in a cesium chloride (CsCl) buoyant-density gradient." },

  { id:"z3_e10", zone:3, difficulty:"easy", type:"true_false",
    prompt:"Specialized transduction can only transfer bacterial genes located near the phage integration site (attachment site).",
    correct:"True",
    explanation:"In specialized transduction (e.g., λ phage), during faulty excision the phage takes bacterial DNA flanking its integration site. Only genes near the att site can be packaged — unlike generalized transduction which can transfer any gene." },

  // — Medium —
  { id:"z3_m1", zone:3, difficulty:"medium", type:"matching",
    prompt:"Match each mechanism of bacterial genetic exchange to its defining feature:",
    pairs:[
      { term:"Transformation",  match:"Recipient cell takes up naked DNA from the environment; requires competent cells" },
      { term:"Conjugation",     match:"DNA transferred through direct cell-to-cell contact via a sex pilus; requires F factor" },
      { term:"Generalized transduction", match:"Phage accidentally packages random bacterial DNA; any gene can be transferred" },
      { term:"Specialized transduction", match:"Phage packages genes adjacent to its chromosomal integration site during faulty excision" },
    ],
    explanation:"All three mechanisms — transformation, conjugation, and transduction — increase bacterial genetic diversity by transferring DNA horizontally between cells (horizontal gene transfer)." },

  { id:"z3_m2", zone:3, difficulty:"medium", type:"matching",
    prompt:"Match each DNA replication component to its function:",
    pairs:[
      { term:"DNA polymerase III",  match:"Main enzyme that synthesizes new DNA strands in the 5'→3' direction" },
      { term:"Primase",             match:"Synthesizes the short RNA primer needed to start each new DNA strand" },
      { term:"DNA ligase",          match:"Joins Okazaki fragments on the lagging strand by forming phosphodiester bonds" },
      { term:"Helicase",            match:"Unwinds the double helix at the replication fork by breaking hydrogen bonds" },
    ],
    explanation:"DNA replication requires a coordinated set of enzymes. DNA polymerase cannot initiate new strands without a primer, which is why primase is essential for both leading- and lagging-strand synthesis." },

  { id:"z3_m3", zone:3, difficulty:"medium", type:"ordering",
    prompt:"Arrange the steps of Hfr × F⁻ CONJUGATION in the correct order:",
    items:["Homologous recombination integrates donor DNA into recipient chromosome","Recipient remains F⁻ (full F factor is usually not transferred)","Hfr chromosome begins transferring via rolling-circle replication","Sex pilus forms between Hfr and F⁻ cells","Mating cells break apart; transfer stops"],
    correct_order:["Sex pilus forms between Hfr and F⁻ cells","Hfr chromosome begins transferring via rolling-circle replication","Mating cells break apart; transfer stops","Homologous recombination integrates donor DNA into recipient chromosome","Recipient remains F⁻ (full F factor is usually not transferred)"],
    explanation:"In Hfr × F⁻ crosses, chromosomal genes closest to the F integration site are transferred earliest and most frequently. Mating cells usually break apart before the entire chromosome (and the trailing F factor) is transferred, so the recipient stays F⁻." },

  { id:"z3_m4", zone:3, difficulty:"medium", type:"matching",
    prompt:"Match each type of repetitive DNA to its description:",
    pairs:[
      { term:"Satellite DNA",         match:"Highly repetitive short sequences that form a separate band in CsCl buoyant-density gradients" },
      { term:"Tandem repeats",        match:"Multiple copies of a sequence arranged consecutively in the same genomic region" },
      { term:"Transposable elements", match:"Mobile DNA sequences that can insert into new genomic locations" },
      { term:"Simple sequence repeats (SSRs)", match:"Short-unit tandem repeats used as genetic markers; also called microsatellites" },
    ],
    explanation:"Repetitive DNA makes up a large fraction of most eukaryotic genomes. Tandem repeats occur in arrays at centromeres and telomeres; transposons are dispersed throughout the genome." },

  { id:"z3_m5", zone:3, difficulty:"medium", type:"ordering",
    prompt:"Arrange the steps of the MESELSON-STAHL experiment in the correct order:",
    items:["Shift bacteria from ¹⁵N to ¹⁴N medium; allow one generation of growth","Extract DNA and centrifuge in CsCl gradient","Grow bacteria in heavy ¹⁵N medium for many generations","Observe one hybrid (intermediate) band — consistent with semi-conservative replication","After two generations, observe both hybrid and light DNA bands"],
    correct_order:["Grow bacteria in heavy ¹⁵N medium for many generations","Shift bacteria from ¹⁵N to ¹⁴N medium; allow one generation of growth","Extract DNA and centrifuge in CsCl gradient","Observe one hybrid (intermediate) band — consistent with semi-conservative replication","After two generations, observe both hybrid and light DNA bands"],
    explanation:"The Meselson-Stahl result — a single hybrid band after one generation and a hybrid + light band after two generations — uniquely supports semi-conservative replication, ruling out conservative or dispersive models." },

  { id:"z3_m6", zone:3, difficulty:"medium", type:"matching",
    prompt:"Match each DNA repair mechanism to its description:",
    pairs:[
      { term:"Mismatch repair",          match:"Recognizes mismatched bases after replication and excises the newly synthesized strand for correction" },
      { term:"Nucleotide-excision repair",match:"Multi-enzyme complex recognizes bulky lesions, excises a patch of single-stranded DNA, and resynthesizes" },
      { term:"Photoreactivation",         match:"Light-activated enzyme (photolyase) directly reverses thymine dimers caused by UV exposure" },
      { term:"DNA damage bypass",         match:"Specialized polymerases replicate over lesions, skipping damage at reduced accuracy" },
    ],
    explanation:"Multiple DNA repair pathways correct different types of damage. The parental (template) strand is usually methylated, allowing mismatch-repair enzymes to distinguish the original strand from the newly synthesized erroneous strand." },

  { id:"z3_m7", zone:3, difficulty:"medium", type:"ordering",
    prompt:"Arrange the steps of bacterial TRANSFORMATION in the correct order:",
    items:["Donor DNA fragment undergoes recombination with recipient chromosome","Recipient cell binds and takes up donor DNA fragment","Transformed cells are selected on appropriate medium","Competent cells are exposed to donor DNA","Uptake machinery degrades one strand; single-stranded DNA enters the cell"],
    correct_order:["Competent cells are exposed to donor DNA","Recipient cell binds and takes up donor DNA fragment","Uptake machinery degrades one strand; single-stranded DNA enters the cell","Donor DNA fragment undergoes recombination with recipient chromosome","Transformed cells are selected on appropriate medium"],
    explanation:"Transformation requires competent cells (able to take up DNA), physical uptake of DNA, and recombination with the chromosome for stable inheritance. The efficiency depends on the competence state of the recipient." },

  { id:"z3_m8", zone:3, difficulty:"medium", type:"matching",
    prompt:"Match each property to either GENERALIZED or SPECIALIZED transduction:",
    pairs:[
      { term:"Any bacterial gene can be transferred",                          match:"Generalized transduction" },
      { term:"Only genes near the phage attachment site (att) are transferred", match:"Specialized transduction" },
      { term:"Results from phage accidentally packaging random host DNA",      match:"Generalized transduction" },
      { term:"Results from imprecise prophage excision",                       match:"Specialized transduction" },
    ],
    explanation:"Lambda (λ) phage is the classic example of specialized transduction; P1 phage is a classic example of generalized transduction. The distinction lies in whether the phage packages random or site-specific bacterial DNA." },

  // — Hard —
  { id:"z3_h1", zone:3, difficulty:"hard", type:"error_id",
    prompt:"A student writes: \"In an Hfr × F⁻ mating, the recipient cell usually becomes F⁺ because the F factor is transferred early in conjugation.\"\n\nWhat is wrong with this statement?",
    options:[
      "The statement is correct — recipients always become F⁺",
      "In Hfr × F⁻ matings, the recipient usually STAYS F⁻ because the F factor is at the TRAILING end of the chromosome and is rarely fully transferred before cells break apart",
      "F⁻ cells cannot receive any DNA from Hfr cells",
      "Hfr cells transfer only the F factor, not chromosomal genes"
    ],
    correct:"B",
    explanation:"In Hfr strains, the F factor is integrated into the chromosome with the origin of transfer at one end. About 100 minutes are required to transfer the entire E. coli chromosome, but cells typically break apart before transfer completes, so the F factor (at the trailing end) is rarely transferred and the recipient stays F⁻." },

  { id:"z3_h2", zone:3, difficulty:"hard", type:"error_id",
    prompt:"A student states: \"Generalized transduction can only transfer bacterial genes that are located immediately adjacent to the phage integration site.\"\n\nIdentify the error:",
    options:[
      "The statement is correct — generalized transduction is site-specific",
      "The student confused generalized with SPECIALIZED transduction. Generalized transduction transfers RANDOM bacterial DNA fragments; specialized transduction transfers genes near the att site",
      "Neither type of transduction transfers bacterial genes",
      "Generalized transduction only works in gram-positive bacteria"
    ],
    correct:"B",
    explanation:"Generalized transduction occurs when a phage accidentally packages random fragments of the bacterial chromosome — any gene can be transferred. Specialized transduction is the site-specific mechanism where imprecise phage excision captures flanking bacterial genes." },

  { id:"z3_h3", zone:3, difficulty:"hard", type:"error_id",
    prompt:"A lab report states: \"DNA polymerase synthesizes the new strand in the 3'→5' direction, adding nucleotides to the 3' end of the growing chain.\"\n\nWhat is the error?",
    options:[
      "DNA polymerase does not add nucleotides to the chain",
      "DNA polymerase synthesizes in the 5'→3' direction — it adds nucleotides to the free 3'-OH end of the existing strand, moving in the 5'→3' direction",
      "DNA polymerase moves in the 3'→5' direction along the template strand",
      "The statement is correct"
    ],
    correct:"B",
    explanation:"DNA polymerase adds new nucleotides to the 3'-OH end of the growing strand, so synthesis proceeds in the 5'→3' direction. It reads the template strand in the 3'→5' direction but synthesizes the new strand 5'→3'." },

  { id:"z3_h4", zone:3, difficulty:"hard", type:"punnett",
    prompt:"In interrupted mating experiments, four genes (a, b, c, d) are mapped by their time of entry into the F⁻ recipient. Gene a enters at 5 min, b at 12 min, c at 20 min, d at 35 min.\n\nWhich gene pair would recombine most frequently?",
    cross:"Interrupted mating (time-of-entry mapping)",
    row_gametes:["Gene a","Gene b","Gene c","Gene d"],
    col_gametes:["Minutes"],
    correct_cells:["5","12","20","35"],
    cell_options:["2","5","8","12","15","20","25","35"],
    ratio_prompt:"Which pair of genes is FARTHEST apart on the Hfr chromosome (most likely to recombine)?",
    ratio_options:["a and b (7 min apart)","b and c (8 min apart)","c and d (15 min apart)","a and d (30 min apart)"],
    ratio_correct:"D",
    explanation:"Distance in an Hfr map corresponds to time of entry (minutes). Gene a enters at 5 min and gene d at 35 min — 30 minutes apart, making them the most distantly separated and most likely to show recombination between them." },

  { id:"z3_h5", zone:3, difficulty:"hard", type:"error_id",
    prompt:"A student reads: \"The initial rate of nucleotide misincorporation by DNA polymerase is about 10⁻⁵ per base pair per replication. After mismatch repair, the final error rate is approximately 10⁻⁸.\"\n\nIs this correct? If not, what is the actual final error rate?",
    options:[
      "The statement is correct",
      "The initial misincorporation rate is correct, but after proofreading (99% correction) and mismatch repair (99.9% of remaining errors), the final rate is approximately 10⁻¹⁰ per base pair",
      "The initial error rate is 10⁻³, not 10⁻⁵",
      "Mismatch repair cannot correct errors from misincorporation"
    ],
    correct:"B",
    explanation:"DNA polymerase misincorporates at ≈10⁻⁵. Proofreading by the 3'→5' exonuclease corrects 99% of errors (→ 10⁻⁷). Post-replication mismatch repair corrects 99.9% of remaining errors, giving a final rate of ≈10⁻¹⁰ per base pair — one of the most accurate processes in biology." },

  { id:"z3_h6", zone:3, difficulty:"hard", type:"error_id",
    prompt:"A student explains the Meselson-Stahl experiment: \"After TWO generations of growth in ¹⁴N medium, we expect to see ONLY light (¹⁴N/¹⁴N) DNA in the CsCl gradient if replication is semi-conservative.\"\n\nWhat is wrong?",
    options:[
      "The student is correct about the two-generation prediction",
      "After two generations with semi-conservative replication, we expect BOTH intermediate-density (hybrid ¹⁵N/¹⁴N) AND light (¹⁴N/¹⁴N) DNA — NOT only light DNA",
      "Semi-conservative replication predicts all heavy DNA after two generations",
      "After two generations all DNA should be dispersed (mixed ¹⁵N and ¹⁴N throughout)"
    ],
    correct:"B",
    explanation:"After two generations, semi-conservative replication predicts two equal bands: one hybrid (intermediate) and one light. The two original ¹⁵N strands each end up in a separate hybrid molecule; the new strands pair with ¹⁴N to give light DNA. Only conservative replication would give exclusively light DNA by generation two." },

  // ══════════════════════════════════════════════════════════
  // ZONE 4 — MOLECULAR GENETICS  (10 easy, 8 medium, 6 hard)
  // ══════════════════════════════════════════════════════════

  // — Easy —
  { id:"z4_e1", zone:4, difficulty:"easy", type:"multiple_choice",
    prompt:"A missense mutation is a point mutation in which:",
    options:["A single nucleotide change creates a premature stop codon","A nucleotide change results in a different amino acid being incorporated into the protein","A nucleotide change does not alter the amino acid sequence","An extra nucleotide is inserted, shifting the reading frame"],
    correct:"B",
    explanation:"A missense mutation substitutes one nucleotide for another, causing a codon to specify a different amino acid. The classic example is sickle-cell anemia, where a single base change causes a glutamic acid → valine substitution in β-globin." },

  { id:"z4_e2", zone:4, difficulty:"easy", type:"true_false",
    prompt:"A silent mutation is a point mutation that changes the amino acid sequence of the encoded protein.",
    correct:"False",
    explanation:"Silent mutations are point mutations that do NOT change the amino acid sequence. They either occur in non-coding regions or substitute a synonymous codon (coding for the same amino acid, due to the degeneracy of the genetic code)." },

  { id:"z4_e3", zone:4, difficulty:"easy", type:"multiple_choice",
    prompt:"Which DNA repair mechanism uses a light-activated enzyme (photolyase) to directly reverse thymine dimers caused by UV radiation?",
    options:["Mismatch repair","Nucleotide-excision repair","Photoreactivation","Base-excision repair"],
    correct:"C",
    explanation:"Photoreactivation uses the enzyme photolyase, which is activated by visible light, to directly break the covalent bonds of thymine dimers, restoring the original bases without excising any DNA." },

  { id:"z4_e4", zone:4, difficulty:"easy", type:"multiple_choice",
    prompt:"In eukaryotes, the TATA box is a core promoter element found approximately how far upstream of the transcription start site?",
    options:["300–500 bp upstream","10–35 bp upstream","~30 bp upstream (−30 region)","Exactly at the +1 start site"],
    correct:"C",
    explanation:"The TATA box consensus sequence (5'-TATAAA-3') is found ≈ 30 bp upstream of the transcription start site (+1) in eukaryotic core promoters. The TRIID complex binds here and recruits RNA polymerase II." },

  { id:"z4_e5", zone:4, difficulty:"easy", type:"true_false",
    prompt:"Tumor suppressor genes promote cell division; when mutated, they cause uncontrolled proliferation.",
    correct:"False",
    explanation:"Tumor suppressor genes INHIBIT cell division and promote apoptosis. Loss of tumor suppressor function (not gain) contributes to cancer. Oncogenes are the genes that, when activated, promote cell proliferation." },

  { id:"z4_e6", zone:4, difficulty:"easy", type:"multiple_choice",
    prompt:"The universal start codon in mRNA that initiates translation is:",
    options:["UAA","UAG","AUG","GUG"],
    correct:"C",
    explanation:"AUG is the start codon that encodes the amino acid methionine (in eukaryotes) or formyl-methionine (in prokaryotes). It defines the reading frame and is recognized by the initiator tRNA." },

  { id:"z4_e7", zone:4, difficulty:"easy", type:"multiple_choice",
    prompt:"miRNAs and siRNAs direct gene silencing primarily by:",
    options:["Blocking transcription at the promoter","Binding to complementary mRNA sequences via the RISC complex, leading to mRNA degradation or translational repression","Methylating the gene's promoter region","Editing the DNA sequence of the target gene"],
    correct:"B",
    explanation:"miRNA and siRNA guide the RNA-induced silencing complex (RISC) to complementary mRNA sequences. RISC then cleaves or destabilizes the mRNA (or blocks translation), reducing protein production from the target gene." },

  { id:"z4_e8", zone:4, difficulty:"easy", type:"true_false",
    prompt:"In eukaryotes, RNA polymerase II cannot initiate transcription on its own — it requires the assistance of transcription factors (TFs).",
    correct:"True",
    explanation:"Eukaryotic RNA polymerase II needs general transcription factors (GTFs) to assemble at the promoter and form the pre-initiation complex before transcription can begin. Specific transcription factors then regulate the level of transcription." },

  { id:"z4_e9", zone:4, difficulty:"easy", type:"multiple_choice",
    prompt:"A frameshift mutation is caused by:",
    options:["A single nucleotide substitution","Insertion or deletion of a number of nucleotides that is NOT a multiple of three, shifting the reading frame","Substitution of one purine for another","A premature stop codon generated by a point mutation"],
    correct:"B",
    explanation:"Frameshift mutations result from insertions or deletions of 1, 2, 4, or 5 nucleotides (any number not divisible by 3). All codons downstream of the mutation are shifted, usually producing a completely different and truncated protein." },

  { id:"z4_e10", zone:4, difficulty:"easy", type:"true_false",
    prompt:"A nonsense mutation is a point mutation that creates a premature STOP codon in the coding sequence.",
    correct:"True",
    explanation:"A nonsense mutation substitutes a nucleotide such that the codon changes to one of the three stop codons (UAA, UAG, UGA). This results in premature termination of translation, producing a truncated and usually nonfunctional protein." },

  // — Medium —
  { id:"z4_m1", zone:4, difficulty:"medium", type:"matching",
    prompt:"Match each type of point mutation to its molecular consequence:",
    pairs:[
      { term:"Missense",  match:"One amino acid is replaced by a different amino acid in the protein" },
      { term:"Nonsense",  match:"A codon is changed to a premature stop codon; translation terminates early" },
      { term:"Silent",    match:"Nucleotide change that does not alter the amino acid sequence (synonymous codon)" },
      { term:"Frameshift",match:"Insertion or deletion (not multiple of 3) shifts the entire reading frame downstream" },
    ],
    explanation:"These four mutation categories describe the functional consequences at the protein level. Transitions (purine↔purine or pyrimidine↔pyrimidine) and transversions (purine↔pyrimidine) are the underlying chemical changes." },

  { id:"z4_m2", zone:4, difficulty:"medium", type:"matching",
    prompt:"Match each DNA repair mechanism to a key feature that distinguishes it:",
    pairs:[
      { term:"Mismatch repair",           match:"Uses methylation status to distinguish the template strand from the newly synthesized strand" },
      { term:"Nucleotide-excision repair", match:"Multi-enzyme complex excises a patch of 12–27 nucleotides containing the lesion" },
      { term:"Photoreactivation",          match:"Requires visible light to activate photolyase; directly reverses UV-induced thymine dimers" },
      { term:"Proofreading by DNA pol III",match:"3'→5' exonuclease activity immediately removes misincorporated nucleotides" },
    ],
    explanation:"Each repair pathway targets specific lesion types. Together, these mechanisms reduce the final error rate to approximately 10⁻¹⁰ per base pair per replication in E. coli." },

  { id:"z4_m3", zone:4, difficulty:"medium", type:"ordering",
    prompt:"Arrange the three stages of PROKARYOTIC TRANSCRIPTION in order and describe the key event:",
    items:["Elongation: RNA polymerase moves along the template synthesizing mRNA in the 5'→3' direction","Termination: completed RNA is released and RNA polymerase dissociates","Initiation: RNA polymerase recognizes and binds to the −10 and −35 promoter sequences"],
    correct_order:["Initiation: RNA polymerase recognizes and binds to the −10 and −35 promoter sequences","Elongation: RNA polymerase moves along the template synthesizing mRNA in the 5'→3' direction","Termination: completed RNA is released and RNA polymerase dissociates"],
    explanation:"Unlike DNA polymerase, RNA polymerase does not require a primer. In prokaryotes (E. coli), the σ (sigma) factor enables the core enzyme to recognize the −10 and −35 promoter consensus sequences to initiate transcription." },

  { id:"z4_m4", zone:4, difficulty:"medium", type:"matching",
    prompt:"Match each gene regulatory element to its function:",
    pairs:[
      { term:"Enhancer",           match:"Cis-regulatory DNA sequence that increases transcription of a target gene; can act at a distance" },
      { term:"Silencer",           match:"Cis-regulatory sequence that decreases transcription of a target gene" },
      { term:"TATA box",           match:"Core promoter element ~30 bp upstream of transcription start; recruits general TFs and RNA pol II" },
      { term:"Chromatin remodeling",match:"Alters nucleosome positioning (e.g., histone acetylation) to change DNA accessibility for transcription" },
    ],
    explanation:"Eukaryotic gene regulation is multilayered: chromatin structure gates access, the core promoter positions RNA pol II, and enhancers/silencers bound by specific transcription factors fine-tune expression levels." },

  { id:"z4_m5", zone:4, difficulty:"medium", type:"ordering",
    prompt:"Arrange the steps of eukaryotic TRANSLATION in the correct order:",
    items:["Elongation: tRNAs bring amino acids to the ribosome; peptide bonds form","Termination: stop codon in A site is recognized by release factor; polypeptide released","Initiation: small ribosomal subunit scans mRNA for AUG start codon; large subunit joins"],
    correct_order:["Initiation: small ribosomal subunit scans mRNA for AUG start codon; large subunit joins","Elongation: tRNAs bring amino acids to the ribosome; peptide bonds form","Termination: stop codon in A site is recognized by release factor; polypeptide released"],
    explanation:"Translation at the ribosome involves three stages. The ribosome has three sites: A (aminoacyl), P (peptidyl), and E (exit). Elongation cycles aminoacyl-tRNAs through the A site, forms peptide bonds, and translocates the ribosome." },

  { id:"z4_m6", zone:4, difficulty:"medium", type:"matching",
    prompt:"Match each type of RNA to its role in gene expression:",
    pairs:[
      { term:"mRNA (messenger RNA)",   match:"Carries the coding information from DNA to the ribosome for translation" },
      { term:"tRNA (transfer RNA)",    match:"Adapter molecule that carries a specific amino acid and recognizes a codon via its anticodon" },
      { term:"rRNA (ribosomal RNA)",   match:"Structural and catalytic component of the ribosome (peptidyl transferase activity)" },
      { term:"miRNA (microRNA)",       match:"Small non-coding RNA that guides RISC to silence complementary mRNA targets" },
    ],
    explanation:"RNA molecules play diverse roles beyond just carrying genetic information. rRNA in the large ribosomal subunit is a ribozyme — it catalyzes peptide bond formation. miRNAs are key post-transcriptional regulators of gene expression." },

  { id:"z4_m7", zone:4, difficulty:"medium", type:"matching",
    prompt:"Match each cancer genetics term to its definition:",
    pairs:[
      { term:"Proto-oncogene",    match:"Normal cellular gene involved in cell growth regulation; can become an oncogene when mutated or overexpressed" },
      { term:"Oncogene",          match:"Mutated or overexpressed version of a proto-oncogene; gain-of-function mutation promotes uncontrolled cell growth" },
      { term:"Tumor suppressor gene", match:"Gene whose normal function is to inhibit cell division or promote apoptosis; loss-of-function contributes to cancer" },
      { term:"Two-hit hypothesis",match:"Knudson's model: both copies of a tumor suppressor must be inactivated for cancer to develop" },
    ],
    explanation:"Cancer results from accumulated mutations in genes controlling cell division. Oncogenes are dominant (one mutant allele suffices); tumor suppressors are recessive at the cellular level (both alleles must be inactivated per Knudson's two-hit hypothesis)." },

  { id:"z4_m8", zone:4, difficulty:"medium", type:"ordering",
    prompt:"Arrange the steps of the miRNA/siRNA gene-silencing pathway in the correct order:",
    items:["RISC scans cytoplasm for complementary mRNA sequences","Pre-miRNA is exported from the nucleus to the cytoplasm","mRNA is degraded or translation is blocked","Dicer cleaves dsRNA/pre-miRNA into ~21-23 nt small RNAs","Single-stranded RNA guide strand is loaded into RISC complex"],
    correct_order:["Pre-miRNA is exported from the nucleus to the cytoplasm","Dicer cleaves dsRNA/pre-miRNA into ~21-23 nt small RNAs","Single-stranded RNA guide strand is loaded into RISC complex","RISC scans cytoplasm for complementary mRNA sequences","mRNA is degraded or translation is blocked"],
    explanation:"The RNAi pathway: dsRNA/pre-miRNA → Dicer cleavage → RISC loading (guide strand) → target mRNA silencing. This pathway is conserved across eukaryotes and provides an important defense against viruses and transposons." },

  // — Hard —
  { id:"z4_h1", zone:4, difficulty:"hard", type:"error_id",
    prompt:"A student writes: \"A nonsense mutation is caused by the insertion of one or two nucleotides into the coding sequence, which creates a premature stop codon by shifting the reading frame.\"\n\nIdentify ALL errors in this statement:",
    options:[
      "The statement is correct",
      "A nonsense mutation is a POINT SUBSTITUTION that directly creates a stop codon — it does NOT involve an insertion. The student described a frameshift mutation",
      "Frameshifts never create stop codons",
      "Stop codons cannot be created by single base substitutions"
    ],
    correct:"B",
    explanation:"A nonsense mutation is a point mutation (single nucleotide substitution) that converts a sense codon to one of the three stop codons (UAA, UAG, UGA). A frameshift mutation (insertion/deletion) is a completely different type of mutation and can also generate downstream stop codons, but this is not called a nonsense mutation." },

  { id:"z4_h2", zone:4, difficulty:"hard", type:"error_id",
    prompt:"In a genetics lecture, the instructor states: \"The lac operon is repressed (turned off) when lactose is present in the growth medium.\"\n\nIs this correct?",
    options:[
      "Yes — lactose represses the lac operon",
      "No — the lac operon is INDUCED (turned on) when lactose is present. Allolactose (a lactose derivative) binds the lac repressor and inactivates it, allowing transcription of the lacZ, lacY, and lacA genes",
      "The lac operon is constitutively expressed and cannot be repressed",
      "Lactose only affects the lac operon in eukaryotes"
    ],
    correct:"B",
    explanation:"The lac operon encodes enzymes for lactose metabolism. When lactose is absent, the lac repressor (LacI product) binds the operator and blocks transcription. When lactose is present, allolactose binds and inactivates the repressor, inducing the operon. Absence of glucose (catabolite repression via cAMP-CAP) also contributes to full induction." },

  { id:"z4_h3", zone:4, difficulty:"hard", type:"error_id",
    prompt:"A student compares gene expression in prokaryotes and eukaryotes: \"In eukaryotes, as in prokaryotes, mRNA is translated by ribosomes as it is being transcribed — the two processes are coupled.\"\n\nWhat is the error?",
    options:[
      "The statement is correct — both systems couple transcription and translation",
      "In EUKARYOTES, transcription and translation are uncoupled: transcription occurs in the nucleus (with mRNA processing: 5' cap, poly-A tail, intron splicing) and the mature mRNA is exported to the cytoplasm before translation begins",
      "Prokaryotes do not couple transcription and translation",
      "Eukaryotic mRNA is not processed before translation"
    ],
    correct:"B",
    explanation:"In prokaryotes (no nucleus), transcription and translation can occur simultaneously. In eukaryotes, pre-mRNA is transcribed in the nucleus, processed (5' cap, poly-A tail, splicing of introns), and exported to the cytoplasm as mature mRNA before ribosomal translation begins." },

  { id:"z4_h4", zone:4, difficulty:"hard", type:"punnett",
    prompt:"Retinoblastoma (Rb) follows the two-hit hypothesis. A parent is heterozygous (Rb+/Rb−) for the tumor suppressor. Fill in the Punnett square for this parent crossed with a wild-type (Rb+/Rb+) individual.",
    cross:"Rb+/Rb− × Rb+/Rb+",
    row_gametes:["Rb+","Rb−"],
    col_gametes:["Rb+","Rb+"],
    correct_cells:["Rb+/Rb+","Rb+/Rb+","Rb+/Rb−","Rb+/Rb−"],
    cell_options:["Rb+/Rb+","Rb+/Rb−","Rb−/Rb−","Rb−/Rb+"],
    ratio_prompt:"What proportion of offspring inherit the heterozygous Rb+/Rb− genotype (and would require a somatic 'second hit' for cancer to develop)?",
    ratio_options:["0% (none)","25%","50%","100%"],
    ratio_correct:"C",
    explanation:"The cross Rb+/Rb− × Rb+/Rb+ yields 50% Rb+/Rb+ (wild-type) and 50% Rb+/Rb− (carriers with elevated cancer risk). Carriers have one functional and one defective Rb allele — cancer develops if a somatic mutation inactivates the remaining wild-type allele (the second hit)." },

  { id:"z4_h5", zone:4, difficulty:"hard", type:"error_id",
    prompt:"A student classifies a mutation: \"A change from CGA (arginine) to CGG (arginine) is a missense mutation because a nucleotide was substituted.\"\n\nWhat is the error?",
    options:[
      "The mutation is a nonsense mutation",
      "This is a SILENT (synonymous) mutation, not a missense mutation — both CGA and CGG encode arginine, so the amino acid sequence is unchanged",
      "CGA and CGG encode different amino acids",
      "The statement is correct — any nucleotide substitution is a missense mutation"
    ],
    correct:"B",
    explanation:"CGA and CGG both encode arginine (due to the degeneracy of the genetic code). Because the amino acid sequence is unchanged, this is a silent (synonymous) mutation. A missense mutation results in a DIFFERENT amino acid being incorporated." },

  { id:"z4_h6", zone:4, difficulty:"hard", type:"error_id",
    prompt:"A student studying DNA repair states: \"Transitions are purine-to-pyrimidine base substitutions (e.g., A→C), while transversions are purine-to-purine or pyrimidine-to-pyrimidine substitutions (e.g., A→G).\"\n\nWhat is wrong?",
    options:[
      "The statement is correct",
      "The definitions are REVERSED: transitions are purine→purine or pyrimidine→pyrimidine (same class, e.g., A↔G or C↔T); transversions are purine↔pyrimidine (different class, e.g., A↔C)",
      "Transitions and transversions are the same thing",
      "Purines can only pair with purines in DNA"
    ],
    correct:"B",
    explanation:"Transitions: same base class (purine→purine: A↔G; pyrimidine→pyrimidine: C↔T). Transversions: different base class (purine↔pyrimidine: A↔C, A↔T, G↔C, G↔T). Transitions are more common because they involve structurally similar bases." },

  // ══════════════════════════════════════════════════════════
  // ZONE 5 — EVOLUTION & POPULATION GENETICS  (10 easy, 8 medium, 6 hard)
  // ══════════════════════════════════════════════════════════

  // — Easy —
  { id:"z5_e1", zone:5, difficulty:"easy", type:"multiple_choice",
    prompt:"In the Hardy-Weinberg equation p² + 2pq + q² = 1, what do the three terms represent?",
    options:["p² = frequency of dominant allele; 2pq = frequency of heterozygotes; q² = frequency of recessive allele","p² = frequency of AA genotype; 2pq = frequency of Aa genotype; q² = frequency of aa genotype","p = dominant allele; q = recessive allele; pq = gene frequency","p² = phenotype frequency; 2pq = genotype frequency; q² = allele frequency"],
    correct:"B",
    explanation:"In a Hardy-Weinberg population, genotype frequencies are: AA = p², Aa = 2pq, aa = q², where p and q are the frequencies of the two alleles (p + q = 1). These frequencies remain constant across generations under HWE." },

  { id:"z5_e2", zone:5, difficulty:"easy", type:"true_false",
    prompt:"In a population at Hardy-Weinberg equilibrium, allele frequencies change from generation to generation due to random mating.",
    correct:"False",
    explanation:"The Hardy-Weinberg principle states that allele and genotype frequencies remain CONSTANT from generation to generation in the absence of evolution (no mutation, migration, drift, or selection, with random mating). Random mating shuffles genotypes but does not change allele frequencies." },

  { id:"z5_e3", zone:5, difficulty:"easy", type:"multiple_choice",
    prompt:"The founder effect occurs when:",
    options:["A population undergoes a sudden sharp reduction in size due to a catastrophic event","A small number of individuals from a larger population establish a new, isolated population","Inbreeding increases the frequency of homozygotes in a population","Natural selection removes deleterious alleles from the gene pool"],
    correct:"B",
    explanation:"The founder effect is a form of genetic drift in which a small number of 'founding' individuals establish a new population. Their allele frequencies may differ considerably from the original population, reducing genetic diversity." },

  { id:"z5_e4", zone:5, difficulty:"easy", type:"multiple_choice",
    prompt:"Which of the following is NOT an assumption of Hardy-Weinberg equilibrium?",
    options:["No natural selection","Random mating","Large population size","Frequent mutation at each locus"],
    correct:"D",
    explanation:"HWE assumes no mutation, no migration, no genetic drift (large population), no selection, and random mating. Mutation violates HWE and is listed as an assumption of ABSENCE — it is not permitted under the HWE null model." },

  { id:"z5_e5", zone:5, difficulty:"easy", type:"true_false",
    prompt:"Directional natural selection consistently favors one phenotypic extreme over the other, shifting the population mean over generations.",
    correct:"True",
    explanation:"Directional selection favors individuals at one extreme of the phenotypic distribution (e.g., larger body size). Over generations, the population mean shifts toward that extreme as favored alleles increase in frequency." },

  { id:"z5_e6", zone:5, difficulty:"easy", type:"multiple_choice",
    prompt:"In population genetics, a genotype with relative fitness W = 1 is:",
    options:["Completely lethal","The most fit genotype in the population (the reference standard)","Neutral — it neither increases nor decreases in frequency","Eliminated by natural selection"],
    correct:"B",
    explanation:"By convention, the most fit genotype is assigned W = 1 (or absolute fitness normalized to 1). All other genotypes are scaled relative to this standard. A genotype with W < 1 has reduced fitness (selection coefficient s = 1 − W > 0)." },

  { id:"z5_e7", zone:5, difficulty:"easy", type:"true_false",
    prompt:"The neutral theory of molecular evolution proposes that most molecular (DNA and protein) variation within and between species is selectively neutral.",
    correct:"True",
    explanation:"Neutral theory (Kimura, 1968) proposes that the majority of molecular variants are selectively neutral and their frequencies change via genetic drift, not natural selection. This theory underlies the concept of the molecular clock." },

  { id:"z5_e8", zone:5, difficulty:"easy", type:"multiple_choice",
    prompt:"Which mode of natural selection favors individuals with INTERMEDIATE phenotypic values and reduces variation in the population?",
    options:["Directional selection","Disruptive selection","Stabilizing selection","Frequency-dependent selection"],
    correct:"C",
    explanation:"Stabilizing selection acts against both extremes, favoring the intermediate phenotype. It maintains the population mean but reduces phenotypic variance. Human birth weight is a classic example." },

  { id:"z5_e9", zone:5, difficulty:"easy", type:"multiple_choice",
    prompt:"The inbreeding coefficient F measures:",
    options:["The degree of genetic relatedness between parents","The probability that an individual is autozygous (both alleles at a locus are identical by descent)","The rate at which allele frequencies change per generation","The selection coefficient against inbred offspring"],
    correct:"B",
    explanation:"The inbreeding coefficient F is the probability that both alleles at a locus in an individual are identical by descent (IBD) — inherited from the same ancestral copy. Inbreeding increases homozygosity and decreases heterozygosity in the population." },

  { id:"z5_e10", zone:5, difficulty:"easy", type:"true_false",
    prompt:"Gene flow (migration) between two isolated populations tends to HOMOGENIZE allele frequencies between them.",
    correct:"True",
    explanation:"Gene flow introduces alleles from one population to another. If populations have different allele frequencies, migration averages them out — reducing genetic differentiation (FST) between populations and homogenizing allele frequencies over time." },

  // — Medium —
  { id:"z5_m1", zone:5, difficulty:"medium", type:"matching",
    prompt:"Match each mode of natural selection to its description:",
    pairs:[
      { term:"Directional selection",  match:"Consistently favors one phenotypic extreme; shifts population mean over generations" },
      { term:"Stabilizing selection",  match:"Favors intermediate phenotypes; reduces variance while maintaining the mean" },
      { term:"Disruptive selection",   match:"Favors both extremes over the intermediate; can lead to bimodal distributions or speciation" },
      { term:"Balancing selection",    match:"Maintains two or more alleles at high frequency (e.g., overdominance/heterozygote advantage)" },
    ],
    explanation:"Different selection regimes have different effects on the shape of the phenotypic distribution. Sickle-cell anemia is a classic case of balancing selection (heterozygote advantage) in malaria-endemic regions." },

  { id:"z5_m2", zone:5, difficulty:"medium", type:"matching",
    prompt:"Match each evolutionary force to its primary effect on allele frequencies:",
    pairs:[
      { term:"Mutation",        match:"Introduces new alleles into the gene pool; rate is very low per locus per generation" },
      { term:"Genetic drift",   match:"Random changes in allele frequency due to chance; strongest in small populations" },
      { term:"Natural selection",match:"Deterministic change in allele frequency based on differential reproductive fitness" },
      { term:"Gene flow",       match:"Transfer of alleles between populations via migration; homogenizes allele frequencies" },
    ],
    explanation:"These four forces drive evolutionary change in allele frequencies. Hardy-Weinberg equilibrium is the null model predicting NONE of these forces act. Detecting deviations from HWE indicates one or more forces at work." },

  { id:"z5_m3", zone:5, difficulty:"medium", type:"ordering",
    prompt:"Arrange the steps for calculating EXPECTED GENOTYPE FREQUENCIES using Hardy-Weinberg equilibrium:",
    items:["Calculate 2pq for heterozygote frequency","Verify p + q = 1","Count alleles to determine allele frequencies p and q","Calculate p² for dominant homozygote and q² for recessive homozygote","Compare observed genotype frequencies to HWE expectations using chi-square test"],
    correct_order:["Count alleles to determine allele frequencies p and q","Verify p + q = 1","Calculate p² for dominant homozygote and q² for recessive homozygote","Calculate 2pq for heterozygote frequency","Compare observed genotype frequencies to HWE expectations using chi-square test"],
    explanation:"To test HWE: first estimate allele frequencies from the data (usually from the phenotypic frequency of recessive homozygotes, q² = frequency of aa). Then calculate expected genotype frequencies and compare to observed using chi-square (1 df because p was estimated from the data)." },

  { id:"z5_m4", zone:5, difficulty:"medium", type:"matching",
    prompt:"Match each population genetics event to its consequence for genetic diversity:",
    pairs:[
      { term:"Population bottleneck",  match:"Sharp reduction in population size reduces genetic diversity; allele frequencies change randomly" },
      { term:"Founder effect",         match:"Small founding group creates a new population with reduced diversity and potentially non-representative allele frequencies" },
      { term:"Inbreeding",             match:"Mating between related individuals increases homozygosity and can expose deleterious recessive alleles" },
      { term:"Gene flow",              match:"Migration between populations introduces new alleles and increases genetic diversity in the recipient population" },
    ],
    explanation:"Bottlenecks and founder effects are special cases of genetic drift that occurred historically in many species. The cheetah population famously has very low genetic diversity, likely due to a bottleneck ~10,000 years ago." },

  { id:"z5_m5", zone:5, difficulty:"medium", type:"ordering",
    prompt:"Arrange the key logical steps of PHYLOGENETIC INFERENCE from molecular sequence data in the correct order:",
    items:["Identify a molecular clock to estimate divergence times","Collect homologous DNA or protein sequences from species to compare","Evaluate and select the best-supported tree topology","Build a multiple sequence alignment","Calculate distances or likelihood scores to infer the tree"],
    correct_order:["Collect homologous DNA or protein sequences from species to compare","Build a multiple sequence alignment","Calculate distances or likelihood scores to infer the tree","Evaluate and select the best-supported tree topology","Identify a molecular clock to estimate divergence times"],
    explanation:"Phylogenetic inference uses molecular data (DNA sequences, protein sequences) to reconstruct evolutionary relationships. The molecular clock relies on neutral theory: synonymous substitutions accumulate at a relatively constant rate over time." },

  { id:"z5_m6", zone:5, difficulty:"medium", type:"matching",
    prompt:"Match each molecular evolution term to its definition:",
    pairs:[
      { term:"Neutral theory",         match:"Most molecular variation is selectively neutral; frequency changes driven by drift not selection" },
      { term:"Molecular clock",        match:"Neutral substitutions accumulate at a roughly constant rate over time, allowing estimation of divergence dates" },
      { term:"Synonymous substitution",match:"Nucleotide change that does not alter the encoded amino acid; usually selectively neutral" },
      { term:"Non-synonymous substitution", match:"Nucleotide change that alters the amino acid sequence; may be subject to positive or purifying selection" },
    ],
    explanation:"The ratio of non-synonymous to synonymous substitutions (dN/dS or Ka/Ks) is used to detect positive selection (dN/dS > 1), neutral evolution (dN/dS ≈ 1), or purifying selection (dN/dS < 1) on protein-coding genes." },

  { id:"z5_m7", zone:5, difficulty:"medium", type:"matching",
    prompt:"Match each selection type to its effect on relative fitness (W) of genotypes AA, Aa, and aa:",
    pairs:[
      { term:"Directional selection against aa",   match:"W: AA=1, Aa=1, aa = 1−s (s > 0)" },
      { term:"Heterozygote advantage (overdominance)", match:"W: AA < 1, Aa = 1 (highest), aa < 1" },
      { term:"Purifying selection on aa",           match:"W: AA=1, Aa=1, aa = 0 (lethal recessive)" },
      { term:"Neutral evolution",                   match:"W: AA=1, Aa=1, aa=1 (all equal)" },
    ],
    explanation:"Fitness values (W) determine how selection changes allele frequencies. With directional selection against aa, the frequency of a decreases each generation. Heterozygote advantage (e.g., sickle cell) maintains both alleles at stable intermediate frequencies." },

  { id:"z5_m8", zone:5, difficulty:"medium", type:"ordering",
    prompt:"Arrange the consequences of INBREEDING on a population's genotype frequencies in logical order:",
    items:["Inbreeding coefficient F increases in the population","Heterozygosity decreases by a factor of (1 − F) each generation","Deleterious recessive alleles are expressed in homozygotes (inbreeding depression)","Related individuals mate more often than expected by chance","Homozygosity at all loci increases"],
    correct_order:["Related individuals mate more often than expected by chance","Inbreeding coefficient F increases in the population","Homozygosity at all loci increases","Heterozygosity decreases by a factor of (1 − F) each generation","Deleterious recessive alleles are expressed in homozygotes (inbreeding depression)"],
    explanation:"Inbreeding does not change allele frequencies by itself — it only rearranges them into more homozygous genotypes. The expected heterozygosity under inbreeding is 2pq(1 − F), compared to the HWE expectation of 2pq." },

  // — Hard —
  { id:"z5_h1", zone:5, difficulty:"hard", type:"punnett",
    prompt:"A population has allele frequencies p (A) = 0.6 and q (a) = 0.4. Calculate the expected Hardy-Weinberg genotype frequencies. Fill in the frequency for each genotype class.",
    cross:"p = 0.6, q = 0.4 (allele frequencies in HWE population)",
    row_gametes:["A (freq = 0.6)","a (freq = 0.4)"],
    col_gametes:["A (0.6)","a (0.4)"],
    correct_cells:["AA = 0.36","Aa = 0.24","aA = 0.24","aa = 0.16"],
    cell_options:["AA = 0.36","Aa = 0.24","aA = 0.24","aa = 0.16","AA = 0.60","aa = 0.40","Aa = 0.48","aa = 0.04"],
    ratio_prompt:"What is the total expected frequency of HETEROZYGOTES (Aa) in this HWE population?",
    ratio_options:["0.24","0.48 (sum of Aa + aA)","0.36","0.16"],
    ratio_correct:"B",
    explanation:"HWE genotype frequencies: AA = p² = 0.36, Aa = 2pq = 2(0.6)(0.4) = 0.48, aa = q² = 0.16. Total = 1.0. The heterozygote class (2pq = 0.48) is the most frequent genotype when p and q are both between 1/3 and 2/3." },

  { id:"z5_h2", zone:5, difficulty:"hard", type:"error_id",
    prompt:"A student writes: \"Natural selection only changes PHENOTYPE frequencies; it does not change ALLELE frequencies over generations.\"\n\nWhat is the error?",
    options:[
      "The statement is correct — natural selection acts on phenotypes but not alleles",
      "Natural selection acts on phenotypes but changes ALLELE frequencies: individuals with higher fitness survive and reproduce more, passing their alleles to the next generation at higher rates — this is how allele frequencies evolve",
      "Natural selection acts directly on DNA sequences, not phenotypes",
      "Allele frequencies change only via genetic drift, not selection"
    ],
    correct:"B",
    explanation:"Natural selection acts on phenotypes, but because phenotypes are influenced by genotypes, selection differentially changes the reproductive success of different genotypes. This directly alters allele frequencies across generations — the core mechanism of adaptive evolution." },

  { id:"z5_h3", zone:5, difficulty:"hard", type:"error_id",
    prompt:"A student studying inbreeding concludes: \"Populations with high inbreeding coefficients (F ≈ 0.3) should show a significant EXCESS of heterozygotes compared to Hardy-Weinberg expectations.\"\n\nIdentify the error:",
    options:[
      "The student is correct — inbreeding increases heterozygosity",
      "Inbreeding produces an EXCESS of HOMOZYGOTES (and deficit of heterozygotes) compared to HWE. Expected heterozygosity under inbreeding = 2pq(1 − F), which is less than the HWE expectation of 2pq",
      "Inbreeding has no effect on genotype frequencies",
      "Only extreme inbreeding (F = 1.0) changes genotype frequencies"
    ],
    correct:"B",
    explanation:"Inbreeding increases the probability that both alleles in an individual are identical by descent (IBD), which means more homozygotes and fewer heterozygotes. Observed heterozygosity = 2pq(1−F) < 2pq (HWE). The opposite pattern — excess heterozygotes — can suggest outbreeding, selection for heterozygotes, or population admixture." },

  { id:"z5_h4", zone:5, difficulty:"hard", type:"error_id",
    prompt:"A student reads: \"The founder effect, like the bottleneck effect, is a form of genetic drift that INCREASES genetic diversity in the newly founded population because founders bring new alleles to a previously empty environment.\"\n\nWhat is the error?",
    options:[
      "The statement is correct",
      "The founder effect DECREASES genetic diversity in the newly founded population. Founders represent only a small subset of the original population's allelic diversity; alleles rare in the original population may be absent, and random sampling creates a non-representative gene pool",
      "The founder effect only affects allele frequencies, not genetic diversity",
      "Founder effects only occur in plants, not animals"
    ],
    correct:"B",
    explanation:"The founder effect reduces genetic diversity because a small founding group cannot carry all the alleles present in the source population. Rare alleles are likely lost by chance (genetic drift). The resulting population has lower heterozygosity and allelic richness than the original." },

  { id:"z5_h5", zone:5, difficulty:"hard", type:"punnett",
    prompt:"In a population, allele A has frequency p = 0.8, allele a has frequency q = 0.2. A bottleneck reduces the population to just 5 individuals who happen to have the following genotypes: AA, AA, Aa, aa, AA.\n\nCount the alleles after the bottleneck.",
    cross:"Post-bottleneck: 5 individuals (AA, AA, Aa, aa, AA)",
    row_gametes:["Count A alleles","Count a alleles"],
    col_gametes:["From genotypes"],
    correct_cells:["7 (A alleles)","3 (a alleles)"],
    cell_options:["5","6","7","3","2","4","8"],
    ratio_prompt:"What is the new frequency of allele a in the post-bottleneck population?",
    ratio_options:["q = 0.20 (unchanged)","q = 0.30","q = 0.40","q = 0.10"],
    ratio_correct:"B",
    explanation:"Post-bottleneck alleles: 5 individuals × 2 alleles = 10 total. A alleles: 2+2+1+0+2 = 7. a alleles: 0+0+1+2+0 = 3. New q = 3/10 = 0.30. The bottleneck changed q from 0.2 to 0.3 by random sampling — this is genetic drift in action." },

  { id:"z5_h6", zone:5, difficulty:"hard", type:"error_id",
    prompt:"A student writes: \"Sustained gene flow between two genetically divergent populations will INCREASE the genetic differentiation (FST) between them over time, as each population retains its unique alleles.\"\n\nWhat is the error?",
    options:[
      "The statement is correct — gene flow increases differentiation",
      "Gene flow DECREASES genetic differentiation (FST). Migration introduces alleles from each population into the other, homogenizing allele frequencies and reducing FST. High gene flow counteracts the diverging effects of drift and local selection",
      "Gene flow has no effect on FST",
      "FST is only affected by mutation rates, not gene flow"
    ],
    correct:"B",
    explanation:"FST measures the degree of allele-frequency differentiation between populations. Gene flow reduces FST by transferring alleles between populations and equalizing their frequencies. In contrast, genetic drift and local adaptation increase FST by causing populations to diverge. The balance between drift and migration determines the equilibrium FST." },
];

// ── Utility helpers ──────────────────────────────────────────
const getZone = (id) => ZONES[id - 1];
const byZoneAndDifficulty = (zone, diff) =>
  QUESTIONS.filter(q => q.zone === zone && q.difficulty === diff);
const randomQuestion = (zone, diff, usedIds) => {
  const pool = byZoneAndDifficulty(zone, diff).filter(q => !usedIds.has(q.id));
  if (!pool.length) return byZoneAndDifficulty(zone, diff)[Math.floor(Math.random() * byZoneAndDifficulty(zone, diff).length)];
  return pool[Math.floor(Math.random() * pool.length)];
};

// ── Sub-components: Question types ──────────────────────────

function MCQuestion({ question, onAnswer }) {
  const [selected, setSelected] = useState(null);
  const opts = ["A","B","C","D"];
  return (
    <div className="space-y-3">
      {question.options.map((opt, i) => {
        const letter = opts[i];
        const isSelected = selected === letter;
        return (
          <button key={i} onClick={() => { if (!selected) { setSelected(letter); onAnswer(letter === question.correct); }}}
            className={`w-full text-left p-3 rounded-xl border-2 text-sm transition-all ${
              !selected ? "border-gray-200 bg-white hover:border-blue-300 hover:bg-blue-50 active:scale-95"
              : isSelected && letter === question.correct ? "border-green-400 bg-green-50 text-green-800"
              : isSelected ? "border-red-400 bg-red-50 text-red-800"
              : letter === question.correct && selected ? "border-green-400 bg-green-50 text-green-800"
              : "border-gray-200 bg-gray-50 text-gray-400"}`}>
            <span className="font-bold mr-2">{letter}.</span>{opt}
          </button>
        );
      })}
    </div>
  );
}

function TFQuestion({ question, onAnswer }) {
  const [selected, setSelected] = useState(null);
  return (
    <div className="flex gap-4">
      {["True","False"].map(tf => {
        const correct = question.correct === tf;
        const isSelected = selected === tf;
        return (
          <button key={tf} onClick={() => { if (!selected) { setSelected(tf); onAnswer(correct); }}}
            className={`flex-1 py-4 rounded-xl border-2 font-bold text-lg transition-all ${
              !selected ? "border-gray-200 bg-white hover:bg-blue-50 hover:border-blue-300 active:scale-95"
              : isSelected && correct ? "border-green-400 bg-green-100 text-green-800"
              : isSelected ? "border-red-400 bg-red-100 text-red-800"
              : correct && selected ? "border-green-400 bg-green-100 text-green-800"
              : "border-gray-200 bg-gray-50 text-gray-400"}`}>
            {tf === "True" ? "✓ True" : "✗ False"}
          </button>
        );
      })}
    </div>
  );
}

function MatchingQuestion({ question, onAnswer }) {
  const [selectedTerm, setSelectedTerm] = useState(null);
  const [pairs, setPairs] = useState({});
  const [shuffledMatches] = useState(() => shuffle(question.pairs.map(p => p.match)));
  const [wrong, setWrong] = useState(null);
  const [done, setDone] = useState(false);

  const handleTerm = (term) => { if (pairs[term] || done) return; setSelectedTerm(selectedTerm === term ? null : term); };
  const handleMatch = (match) => {
    if (!selectedTerm || done) return;
    const correct = question.pairs.find(p => p.term === selectedTerm).match === match;
    if (correct) {
      const newPairs = { ...pairs, [selectedTerm]: match };
      setPairs(newPairs);
      setSelectedTerm(null);
      if (Object.keys(newPairs).length === question.pairs.length) {
        setDone(true); setTimeout(() => onAnswer(true), 700);
      }
    } else {
      setWrong(match); setTimeout(() => setWrong(null), 600);
    }
  };

  const matchedValues = new Set(Object.values(pairs));
  return (
    <div className="flex gap-3">
      <div className="flex-1 space-y-2">
        <p className="text-xs font-bold text-gray-500 mb-2">TERMS</p>
        {question.pairs.map((p,i) => (
          <button key={i} onClick={() => handleTerm(p.term)}
            className={`w-full text-left p-2.5 rounded-lg border-2 text-xs transition-all ${
              pairs[p.term] ? "border-green-400 bg-green-50 text-green-800"
              : selectedTerm === p.term ? "border-blue-500 bg-blue-50"
              : "border-gray-200 bg-white hover:border-blue-300"}`}>
            {p.term}
          </button>
        ))}
      </div>
      <div className="flex-1 space-y-2">
        <p className="text-xs font-bold text-gray-500 mb-2">DEFINITIONS</p>
        {shuffledMatches.map((m,i) => (
          <button key={i} onClick={() => handleMatch(m)}
            className={`w-full text-left p-2.5 rounded-lg border-2 text-xs transition-all ${
              matchedValues.has(m) ? "border-green-400 bg-green-50 text-green-800"
              : wrong === m ? "border-red-400 bg-red-50 animate-pulse"
              : selectedTerm ? "border-blue-200 bg-blue-50 hover:border-blue-400 hover:bg-blue-100"
              : "border-gray-200 bg-white"}`}>
            {m}
          </button>
        ))}
      </div>
    </div>
  );
}

function OrderingQuestion({ question, onAnswer }) {
  const [available, setAvailable] = useState(() => shuffle(question.items));
  const [sequence, setSequence] = useState([]);
  const [result, setResult] = useState(null);

  const addToSeq = (item) => {
    setAvailable(a => a.filter(x => x !== item));
    setSequence(s => [...s, item]);
  };
  const removeFromSeq = (item) => {
    setSequence(s => s.filter(x => x !== item));
    setAvailable(a => [...a, item]);
  };
  const checkOrder = () => {
    const correct = sequence.every((item, i) => item === question.correct_order[i]) && sequence.length === question.correct_order.length;
    setResult(correct ? "correct" : "wrong");
    if (correct) setTimeout(() => onAnswer(true), 700);
    else setTimeout(() => { setResult(null); setAvailable(shuffle(question.items)); setSequence([]); }, 1200);
  };

  return (
    <div className="space-y-3">
      <div className="min-h-16 bg-gray-50 border-2 border-dashed border-gray-300 rounded-xl p-2">
        <p className="text-xs text-gray-400 mb-1">Your order (tap to remove):</p>
        <div className="space-y-1">
          {sequence.map((item, i) => (
            <div key={i} onClick={() => { if (!result) removeFromSeq(item); }}
              className={`flex items-center gap-2 p-2 rounded-lg text-xs cursor-pointer transition-all ${
                result === "correct" ? "bg-green-100 border border-green-400 text-green-800"
                : result === "wrong" ? "bg-red-100 border border-red-400 text-red-800"
                : "bg-blue-50 border border-blue-300 hover:bg-blue-100"}`}>
              <span className="font-bold text-gray-500 w-4">{i+1}.</span>{item}
            </div>
          ))}
        </div>
      </div>
      <div className="space-y-1">
        <p className="text-xs text-gray-400">Available (tap to add):</p>
        {available.map((item, i) => (
          <button key={i} onClick={() => addToSeq(item)}
            className="w-full text-left p-2 rounded-lg text-xs bg-white border-2 border-gray-200 hover:border-blue-300 hover:bg-blue-50 transition-all">
            {item}
          </button>
        ))}
      </div>
      {sequence.length === question.items.length && !result && (
        <button onClick={checkOrder} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-700 transition-all">
          ✓ Check Order
        </button>
      )}
      {result === "wrong" && <p className="text-center text-red-600 text-sm font-bold animate-bounce">Not quite — try again!</p>}
    </div>
  );
}

function PunnettQuestion({ question, onAnswer }) {
  const [cells, setCells] = useState(["","","",""]);
  const [showRatio, setShowRatio] = useState(false);
  const [punnettDone, setPunnettDone] = useState(false);
  const [selectedRatio, setSelectedRatio] = useState(null);
  const [activeCell, setActiveCell] = useState(null);

  const cellPositions = [
    {r:0,c:0}, {r:0,c:1}, {r:1,c:0}, {r:1,c:1}
  ];

  const pickOption = (opt) => {
    if (activeCell === null) return;
    const newCells = [...cells];
    newCells[activeCell] = opt;
    setCells(newCells);
    setActiveCell(null);
  };

  const checkPunnett = () => {
    const allCorrect = cells.every((c, i) => {
      const expected = question.correct_cells[i];
      return c === expected || c === expected.split("").reverse().join("");
    });
    if (allCorrect) { setPunnettDone(true); setTimeout(() => setShowRatio(true), 500); }
    else { setCells(["","","",""]); setActiveCell(null); }
  };

  const checkRatio = (letter) => {
    setSelectedRatio(letter);
    setTimeout(() => onAnswer(letter === question.ratio_correct), 700);
  };

  const opts = ["A","B","C","D"];
  const allFilled = cells.every(c => c !== "");

  if (!question.row_gametes || question.row_gametes.length > 2) {
    return (
      <div className="space-y-2">
        <p className="text-sm font-medium text-gray-700">{question.ratio_prompt}</p>
        {question.ratio_options.map((opt, i) => (
          <button key={i} onClick={() => checkRatio(opts[i])}
            className={`w-full text-left p-3 rounded-xl border-2 text-sm transition-all ${
              !selectedRatio ? "border-gray-200 bg-white hover:border-blue-300 hover:bg-blue-50"
              : selectedRatio === opts[i] && opts[i] === question.ratio_correct ? "border-green-400 bg-green-50"
              : selectedRatio === opts[i] ? "border-red-400 bg-red-50"
              : opts[i] === question.ratio_correct && selectedRatio ? "border-green-400 bg-green-50"
              : "border-gray-200 bg-gray-50 text-gray-400"}`}>
            <span className="font-bold mr-2">{opts[i]}.</span>{opt}
          </button>
        ))}
      </div>
    );
  }

  return (
    <div className="space-y-4">
      <p className="text-xs text-gray-500">Cross: <span className="font-bold text-gray-700">{question.cross}</span></p>
      {!showRatio ? (
        <>
          <div className="overflow-x-auto">
            <table className="mx-auto border-collapse text-xs font-mono">
              <thead>
                <tr>
                  <th className="w-12 h-10"></th>
                  {question.col_gametes.map((g,i) => (
                    <th key={i} className="w-16 h-10 text-center font-bold text-blue-700 border border-gray-300 bg-blue-50 px-2">{g}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {question.row_gametes.map((rg, ri) => (
                  <tr key={ri}>
                    <td className="font-bold text-blue-700 border border-gray-300 bg-blue-50 text-center px-2 h-16">{rg}</td>
                    {question.col_gametes.map((cg, ci) => {
                      const idx = ri * question.col_gametes.length + ci;
                      const isActive = activeCell === idx;
                      const isDone = punnettDone && cells[idx];
                      return (
                        <td key={ci} onClick={() => { if (!punnettDone) setActiveCell(isActive ? null : idx); }}
                          className={`w-16 h-16 text-center border-2 cursor-pointer transition-all ${
                            isDone ? "border-green-400 bg-green-50 text-green-800"
                            : isActive ? "border-blue-500 bg-blue-100"
                            : cells[idx] ? "border-gray-300 bg-gray-50"
                            : "border-dashed border-gray-300 hover:border-blue-300 hover:bg-blue-50"}`}>
                          <span className={`font-bold ${cells[idx] ? "text-sm" : "text-gray-300 text-xl"}`}>
                            {cells[idx] || "?"}
                          </span>
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {activeCell !== null && (
            <div className="bg-blue-50 rounded-xl p-3 border border-blue-200">
              <p className="text-xs text-blue-600 mb-2 font-medium">Select genotype for this cell:</p>
              <div className="grid grid-cols-2 gap-2">
                {question.cell_options.map((opt, i) => (
                  <button key={i} onClick={() => pickOption(opt)}
                    className="py-2 px-3 bg-white border-2 border-blue-200 rounded-lg text-sm font-mono hover:bg-blue-100 hover:border-blue-400 transition-all">
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          )}
          {allFilled && !punnettDone && (
            <button onClick={checkPunnett} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-sm hover:bg-blue-700 transition-all">
              ✓ Check Punnett Square
            </button>
          )}
          {!allFilled && <p className="text-center text-xs text-gray-400">Tap each cell (?) to fill it in</p>}
        </>
      ) : (
        <div className="space-y-3">
          <div className="p-3 bg-green-50 border border-green-300 rounded-xl text-sm text-green-700 font-medium text-center">
            ✅ Punnett square correct! Now answer:
          </div>
          <p className="text-sm font-medium text-gray-700">{question.ratio_prompt}</p>
          {question.ratio_options.map((opt, i) => (
            <button key={i} onClick={() => checkRatio(opts[i])}
              className={`w-full text-left p-3 rounded-xl border-2 text-sm transition-all ${
                !selectedRatio ? "border-gray-200 bg-white hover:border-blue-300 hover:bg-blue-50"
                : selectedRatio === opts[i] && opts[i] === question.ratio_correct ? "border-green-400 bg-green-50"
                : selectedRatio === opts[i] ? "border-red-400 bg-red-50"
                : opts[i] === question.ratio_correct && selectedRatio ? "border-green-400 bg-green-50"
                : "border-gray-200 bg-gray-50 text-gray-400"}`}>
              <span className="font-bold mr-2">{opts[i]}.</span>{opt}
            </button>
          ))}
        </div>
      )}
